<!DOCTYPE html>
<html lang="vi" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Elevation Scanner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- SVG sprite — định nghĩa một lần, dùng lại nhiều nơi -->
<svg style="display:none">
  <symbol id="ico-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></symbol>
  <symbol id="ico-sun"  viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></symbol>
  <symbol id="ico-search" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></symbol>
  <symbol id="ico-x" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></symbol>
  <symbol id="ico-paste" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="4" rx="1.5"/><path d="M16 4h1a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h1"/><path d="M9 12h6M9 16h4"/></symbol>
  <symbol id="ico-gps" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/><circle cx="12" cy="12" r="8" opacity=".3"/></symbol>
  <symbol id="ico-layers" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 6 12 2 21 6 12 10"/><polyline points="3 6 3 18 12 22 21 18 21 6"/><line x1="12" y1="10" x2="12" y2="22"/></symbol>
  <symbol id="ico-settings" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07M8.46 8.46a5 5 0 0 0 0 7.07"/></symbol>
  <symbol id="ico-home" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></symbol>
  <symbol id="ico-mountain" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 20 12 4 21 20 3 20"/></symbol>
  <symbol id="ico-water" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C6 2 2 8 2 12s3 8 10 8 10-4 10-8-4-10-10-10z"/></symbol>
  <symbol id="ico-pin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="10" r="3"/><path d="M12 2C7.03 2 3 6.03 3 11c0 5.25 7.5 11 9 11s9-5.75 9-11c0-4.97-4.03-9-9-9z"/></symbol>
</svg>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root,[data-theme="dark"]{
  --bg:#08090c;--s1:#101318;--s2:#181c23;--s3:rgba(16,19,24,0.85);
  --bd:rgba(255,255,255,.07);--bdh:rgba(255,255,255,.14);
  --ac:#3dffa0;--ac2:#38b6ff;--red:#ff4d6d;
  --txt:#dde4f0;--m:#68748c;--m2:#2e3548;
  --shadow:rgba(0,0,0,.5);--r:12px;
}
[data-theme="light"]{
  --bg:#f0f2f7;--s1:#ffffff;--s2:#f5f7fb;--s3:rgba(255,255,255,0.85);
  --bd:rgba(0,0,0,.08);--bdh:rgba(0,0,0,.15);
  --ac:#0a9e5c;--ac2:#0078cc;--red:#d63251;
  --txt:#1a2035;--m:#8a96ae;--m2:#c8d0e0;
  --shadow:rgba(0,0,0,.15);
}

html,body{width:100vw;height:100vh;overflow:hidden;background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif;font-size:14px;transition:background .25s,color .25s}
#map{width:100%;height:100%;z-index:1}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--m);border-radius:4px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes acPulse{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}

.fp{background:var(--s3);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid var(--bd);border-radius:8px;box-shadow:0 4px 16px var(--shadow)}

/* === SEARCH === */
.top-area{position:absolute;z-index:1000;top:10px;left:10px;right:10px;display:flex;flex-direction:column;gap:6px;pointer-events:none;align-items:flex-start}
.top-area>*{pointer-events:auto}
.search-row{display:flex;flex-wrap:nowrap;gap:6px;align-items:center;pointer-events:none}
.search-row>*{pointer-events:auto}
.search-wrap{position:relative;display:flex;align-items:center;z-index:1100}
.search-box{display:flex;align-items:center;height:36px}
.search-input{flex:1;min-width:0;height:34px;background:transparent;border:none;padding:0 6px 0 10px;font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--txt);outline:none;width:230px}
.search-input::placeholder{color:var(--m2)}
.search-actions{display:flex;align-items:center;border-left:1px solid var(--bd);height:34px}
.s-btn{width:30px;height:34px;background:transparent;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--m);transition:color .15s;flex-shrink:0}
.s-btn svg{width:13px;height:13px;pointer-events:none}
.s-btn:hover{color:var(--ac)}
.s-btn.clear:hover{color:var(--red)}
.s-btn.go{color:var(--ac);border-radius:0 8px 8px 0}
.s-btn.go svg{width:14px;height:14px}
.s-btn.go:hover{color:var(--txt)}
.s-sep{width:1px;height:16px;background:var(--bd);flex-shrink:0;margin:0 1px}

.icon-btn{width:36px;height:36px;border:1px solid var(--bd);background:var(--s3);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--m);border-radius:8px;transition:all .15s;box-shadow:0 4px 16px var(--shadow)}
.icon-btn:hover{color:var(--ac);background:var(--s2);border-color:var(--bdh)}
.icon-btn svg{width:16px;height:16px;pointer-events:none}
#gpsBtn:hover{color:var(--ac2)}
#gpsBtn.locating svg{animation:spin .8s linear infinite}

/* === PRESETS === */
.presets{display:flex;gap:4px;padding:4px;overflow-x:auto;flex:0 0 auto}
.pre-btn{padding:4px 10px;border-radius:6px;border:1px solid transparent;background:transparent;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:11.5px;font-weight:500;color:var(--txt);transition:all .14s;white-space:nowrap}
.pre-btn:hover{background:var(--s2);color:var(--ac);border-color:var(--bd)}

/* === LAYER PANEL — desktop: fixed top-right / mobile: popup from toggle btn === */
.layer-panel{position:absolute;z-index:1000;top:10px;right:10px;display:flex;flex-direction:column;gap:4px;padding:4px}
.layer-btn{padding:6px 12px;border-radius:6px;border:1px solid transparent;background:transparent;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:11.5px;font-weight:600;color:var(--m);transition:all .15s;text-align:left;white-space:nowrap}
.layer-btn:hover{color:var(--txt);background:var(--s2)}
.layer-btn.active{background:var(--s2);border-color:var(--bd);color:var(--ac)}
.layer-btn.lbl{border-top:1px solid var(--bd);margin-top:2px}
.layer-btn.lbl.on{color:var(--ac)}
.label-tile-invert{filter:invert(1) brightness(2) drop-shadow(0 0 2px rgba(0,0,0,.95)) drop-shadow(0 0 2px rgba(0,0,0,.8))}

/* === CONFIG PANEL === */
.cfg-panel{position:absolute;z-index:1000;bottom:20px;right:60px;padding:10px 12px;display:flex;flex-direction:column;gap:10px}
.cfg-row{display:flex;align-items:center;gap:12px;justify-content:space-between}
.cfg-label{font-family:'Syne',sans-serif;font-size:9px;font-weight:700;color:var(--m);text-transform:uppercase;letter-spacing:.5px;min-width:48px}
.cfg-pills{display:flex;gap:4px;flex:1;flex-wrap:wrap}
.pill{padding:4px 8px;border-radius:4px;border:1px solid var(--bd);background:transparent;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:10.5px;font-weight:500;color:var(--m);transition:all .14s}
.pill:hover{color:var(--txt);border-color:var(--bdh)}
.pill.active{background:rgba(61,255,160,.1);border-color:var(--ac);color:var(--ac)}
[data-theme="light"] .pill.active{background:rgba(10,158,92,.1)}
.pill.ds.active{background:rgba(56,182,255,.1);border-color:var(--ac2);color:var(--ac2)}
.cfg-div{width:1px;height:18px;background:var(--bd);margin:0 2px}
.mini-grp{display:flex;gap:4px}
.mini-btn{width:26px;height:26px;border-radius:4px;border:1px solid var(--bd);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--m);transition:all .15s}
.mini-btn:hover{color:var(--ac);background:var(--s2);border-color:var(--ac)}
.mini-btn svg{width:13px;height:13px;pointer-events:none}
.lang-btn{font-family:'Syne',sans-serif;font-size:10px;font-weight:700}

/* Theme icon toggle */
[data-theme="light"] .ico-moon{display:none}
[data-theme="light"] .ico-sun{display:block!important}
[data-theme="dark"]  .ico-sun{display:none}
[data-theme="dark"]  .ico-moon{display:block!important}

/* === ELEVATION BADGE === */
.elev-badge{position:absolute;z-index:1000;bottom:20px;left:10px;padding:12px 16px 10px;width:260px;opacity:0;transform:translateY(6px);transition:opacity .35s,transform .35s;pointer-events:none}
.elev-badge.show{opacity:1;transform:translateY(0);pointer-events:all}
.eb-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.eb-num{font-family:'DM Sans',sans-serif;font-size:38px;font-weight:700;color:var(--ac);letter-spacing:-1.5px;line-height:1;transition:color .3s}
.eb-unit{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:var(--m);padding-bottom:2px}
.eb-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
.eb-sublabel{font-family:'Syne',sans-serif;font-size:8px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--m)}
.eb-loc{font-family:'DM Sans',sans-serif;font-size:11.5px;font-weight:500;color:var(--txt);line-height:1.4;word-wrap:break-word}
.eb-div{height:1px;background:var(--bd);margin-bottom:8px}
.eb-terrain-label{font-family:'Syne',sans-serif;font-size:8px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:var(--m);display:flex;justify-content:space-between;margin-bottom:5px}
.eb-track{height:6px;border-radius:4px;background:linear-gradient(90deg,#1a6fff 0%,#00b4ff 12%,#00e676 25%,#76ff03 38%,#ffea00 52%,#ff9100 66%,#ff3d00 80%,#b71c1c 92%,#f5f5f5 100%);position:relative;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.eb-thumb{position:absolute;top:50%;left:0;transform:translate(-50%,-50%);width:12px;height:12px;border-radius:50%;background:#fff;border:2px solid var(--bg);box-shadow:0 0 0 2px var(--ac),0 2px 6px rgba(0,0,0,.5);transition:left 1s cubic-bezier(.34,1.56,.64,1),box-shadow .3s}
.eb-ticks{display:flex;justify-content:space-between;font-size:8.5px;font-family:'JetBrains Mono',monospace;color:var(--m2);margin-top:1px}
.eb-spin{width:10px;height:10px;border:1.5px solid rgba(61,255,160,.2);border-top-color:var(--ac);border-radius:50%;animation:spin .7s linear infinite;position:absolute;top:10px;right:12px;opacity:0;transition:opacity .2s}
.elev-badge.loading .eb-spin{opacity:1}

/* === ZOOM === */
.zoom-cluster{position:absolute;z-index:1000;bottom:20px;right:10px;display:flex;flex-direction:column}
.zoom-btn{width:36px;height:40px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--m);font-size:18px;transition:all .15s}
.zoom-btn:hover{color:var(--txt);background:var(--s2)}
.zoom-btn:first-child{border-bottom:1px solid var(--bd);border-radius:8px 8px 0 0}
.zoom-btn:last-child{border-radius:0 0 8px 8px}

/* === AUTOCOMPLETE === */
.ac-drop{position:absolute;top:calc(100% + 6px);left:0;min-width:280px;max-width:420px;width:max-content;background:var(--s1);border:1px solid var(--bdh);border-radius:var(--r);box-shadow:0 8px 32px var(--shadow);overflow:hidden;z-index:1200;display:none;flex-direction:column;max-height:280px;overflow-y:auto}
.ac-drop.open{display:flex}
.ac-item{display:flex;align-items:flex-start;gap:10px;padding:9px 12px;cursor:pointer;border-bottom:1px solid var(--bd);transition:background .12s}
.ac-item:last-child{border-bottom:none}
.ac-item:hover,.ac-item.focused{background:var(--s2)}
.ac-icon{flex-shrink:0;margin-top:2px;color:var(--ac)}
.ac-icon svg{width:13px;height:13px}
.ac-text{flex:1;min-width:0}
.ac-name{font-family:'DM Sans',sans-serif;font-size:12.5px;font-weight:600;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ac-sub{font-family:'DM Sans',sans-serif;font-size:10.5px;color:var(--m);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ac-type{flex-shrink:0;font-family:'Syne',sans-serif;font-size:9px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:var(--m2);background:var(--s2);border:1px solid var(--bd);border-radius:4px;padding:2px 5px;margin-top:2px;align-self:flex-start}
.ac-loading{padding:12px;text-align:center;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--m);display:flex;align-items:center;justify-content:center;gap:8px}
.ac-dot{width:5px;height:5px;border-radius:50%;background:var(--ac);animation:acPulse .9s ease-in-out infinite}
.ac-dot:nth-child(2){animation-delay:.15s}
.ac-dot:nth-child(3){animation-delay:.3s}
.ac-empty{padding:12px;text-align:center;font-size:11.5px;color:var(--m);font-family:'DM Sans',sans-serif}

/* === TOAST === */
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(8px);padding:8px 18px;background:var(--s2);border:1px solid rgba(61,255,160,.3);border-radius:20px;font-size:12px;color:var(--ac);font-family:'JetBrains Mono',monospace;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;z-index:9999;white-space:nowrap;box-shadow:0 4px 12px var(--shadow)}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{color:var(--red);border-color:rgba(255,77,109,.3)}

/* === MOBILE === */
@media(max-width:768px){
  /* Ẩn desktop panels */
  .layer-panel,.cfg-panel{display:none!important}

  /* Toggle group + popups */
  .mob-grp{position:absolute;z-index:1001;right:10px;display:flex;flex-direction:column;gap:6px}
  .mob-popup{position:absolute;right:46px;background:var(--s3);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid var(--bd);border-radius:10px;box-shadow:0 8px 32px var(--shadow);display:none;flex-direction:column;overflow:hidden;min-width:140px;pointer-events:all}
  .mob-popup.open{display:flex}
  #popLayer{padding:4px;gap:2px}
  #popCfg{padding:10px 12px;gap:10px}

  /* Search: stretch full width on mobile */
  .top-area{align-items:stretch}
  .search-row{width:100%}
  .search-wrap{flex:1;min-width:0}
  .search-box{width:100%}
  .search-input{width:auto;font-size:10.5px}
  .ac-drop{min-width:unset;max-width:calc(100vw - 20px);width:calc(100vw - 20px);right:0;left:0}

  .elev-badge{width:240px}
}

@media(min-width:769px){
  .mob-grp{display:none!important}
  .layer-panel{top:10px!important}
}
</style>
</head>
<body>
<div style="position:relative;width:100%;height:100%">
  <div id="map"></div>

  <!-- Search -->
  <div class="top-area" id="topArea">
    <div class="search-row">
      <div class="search-wrap">
        <div class="fp search-box">
          <input class="search-input" id="searchInput" type="text"
            placeholder="Search place or enter coordinates..."
            autocomplete="off"
            oninput="onSearchInput(this.value)"
            onkeydown="onSearchKeydown(event)">
          <div class="search-actions">
            <button class="s-btn clear" id="btnClear" onclick="clearSearch()">
              <svg><use href="#ico-x"/></svg>
            </button>
            <div class="s-sep"></div>
            <button class="s-btn go" onclick="triggerSearch()">
              <svg><use href="#ico-search"/></svg>
            </button>
          </div>
        </div>
        <div class="ac-drop" id="acDrop"></div>
      </div>
      <button class="icon-btn" id="pasteBtn" onclick="doPaste()">
        <svg><use href="#ico-paste"/></svg>
      </button>
      <button class="icon-btn" id="gpsBtn" onclick="doGPS()">
        <svg><use href="#ico-gps"/></svg>
      </button>
    </div>
    <div class="fp presets" id="presets">
      <button class="pre-btn" onclick="setCoords(12.2459,109.1945)">Nha Trang</button>
      <button class="pre-btn" onclick="setCoords(21.0285,105.8542)">Hà Nội</button>
      <button class="pre-btn" onclick="setCoords(20.8449,106.6881)">Hải Phòng</button>
      <button class="pre-btn" onclick="setCoords(16.0544,108.2022)">Đà Nẵng</button>
      <button class="pre-btn" onclick="setCoords(10.7769,106.7009)">TP. HCM</button>
    </div>
  </div>

  <!-- Layer Panel (desktop) -->
  <div class="fp layer-panel" id="layerPanel">
    <button class="layer-btn" data-layer="street" onclick="switchLayer('street',this)">Street</button>
    <button class="layer-btn active" data-layer="satellite" onclick="switchLayer('satellite',this)">Satellite</button>
    <button class="layer-btn" data-layer="topo" onclick="switchLayer('topo',this)">Terrain</button>
    <button class="layer-btn lbl on" id="btnLabels" onclick="toggleLabels(this)">Labels</button>
  </div>

  <!-- Config Panel (desktop) -->
  <div class="fp cfg-panel" id="cfgPanel">
    <div class="cfg-row">
      <span class="cfg-label" data-i18n="lblSource">Source:</span>
      <div class="cfg-pills">
        <button class="pill active" data-src="open-meteo" onclick="setSrc('open-meteo',this)">O-Meteo</button>
        <button class="pill" data-src="open-elevation" onclick="setSrc('open-elevation',this)">O-Elev</button>
      </div>
      <div class="cfg-div"></div>
      <div class="mini-grp">
        <button class="mini-btn lang-btn" onclick="toggleLang()">EN</button>
        <button class="mini-btn" onclick="toggleTheme()">
          <svg class="ico-moon"><use href="#ico-moon"/></svg>
          <svg class="ico-sun" style="display:none"><use href="#ico-sun"/></svg>
        </button>
      </div>
    </div>
    <div class="cfg-row">
      <span class="cfg-label" data-i18n="lblDataset">Dataset:</span>
      <div class="cfg-pills">
        <button class="pill ds active" data-ds="srtm30" onclick="setDs('srtm30',this)">SRTM30</button>
        <button class="pill ds" data-ds="srtm90" onclick="setDs('srtm90',this)">SRTM90</button>
        <button class="pill ds" data-ds="aster" onclick="setDs('aster',this)">ASTER</button>
        <button class="pill ds" data-ds="mapzen" onclick="setDs('mapzen',this)">Mapzen</button>
      </div>
    </div>
  </div>

  <!-- Elevation Badge -->
  <div class="fp elev-badge" id="elevBadge">
    <div class="eb-spin"></div>
    <div class="eb-top">
      <div style="display:flex;align-items:baseline;gap:3px;flex-shrink:0">
        <span class="eb-num" id="elevNum">—</span>
        <span class="eb-unit">m</span>
      </div>
      <div class="eb-info">
        <span class="eb-sublabel" id="elevDsLabel">Elevation · SRTM30</span>
        <span class="eb-loc" id="elevLoc">Locating...</span>
      </div>
    </div>
    <div class="eb-div"></div>
    <div class="eb-terrain-label">
      <span data-i18n="lblTerrain">Terrain</span>
      <span id="terrainDesc">—</span>
    </div>
    <div class="eb-track"><div class="eb-thumb" id="terrainThumb"></div></div>
    <div class="eb-ticks">
      <span data-i18n="sea">Sea</span>
      <span>500m</span><span>1500m</span><span>3000m+</span>
    </div>
  </div>

  <!-- Zoom -->
  <div class="fp zoom-cluster" id="zoomCluster">
    <button class="zoom-btn" onclick="map.zoomIn()">+</button>
    <button class="zoom-btn" onclick="map.zoomOut()">−</button>
  </div>

  <!-- Mobile toggle group -->
  <div class="mob-grp" id="mobGrp">
    <div style="position:relative">
      <button class="icon-btn" id="mobLayerBtn" onclick="mobToggle('layer')">
        <svg><use href="#ico-layers"/></svg>
      </button>
      <div class="mob-popup" id="popLayer">
        <button class="layer-btn" data-layer="street" onclick="switchLayer('street',this);mobClose()">Street</button>
        <button class="layer-btn active" data-layer="satellite" onclick="switchLayer('satellite',this);mobClose()">Satellite</button>
        <button class="layer-btn" data-layer="topo" onclick="switchLayer('topo',this);mobClose()">Terrain</button>
        <button class="layer-btn lbl on" onclick="toggleLabels(this)">Labels</button>
      </div>
    </div>
    <div style="position:relative">
      <button class="icon-btn" id="mobCfgBtn" onclick="mobToggle('cfg')">
        <svg><use href="#ico-settings"/></svg>
      </button>
      <div class="mob-popup" id="popCfg">
        <div class="cfg-row">
          <span class="cfg-label" data-i18n="lblSource">Source:</span>
          <div class="cfg-pills">
            <button class="pill active" data-src="open-meteo" onclick="setSrc('open-meteo',this)">O-Meteo</button>
            <button class="pill" data-src="open-elevation" onclick="setSrc('open-elevation',this)">O-Elev</button>
          </div>
        </div>
        <div class="cfg-row">
          <div class="mini-grp">
            <button class="mini-btn lang-btn" onclick="toggleLang()">EN</button>
            <button class="mini-btn" onclick="toggleTheme()">
              <svg class="ico-moon"><use href="#ico-moon"/></svg>
              <svg class="ico-sun" style="display:none"><use href="#ico-sun"/></svg>
            </button>
          </div>
        </div>
        <div class="cfg-row">
          <span class="cfg-label" data-i18n="lblDataset">Dataset:</span>
          <div class="cfg-pills">
            <button class="pill ds active" data-ds="srtm30" onclick="setDs('srtm30',this)">SRTM30</button>
            <button class="pill ds" data-ds="srtm90" onclick="setDs('srtm90',this)">SRTM90</button>
            <button class="pill ds" data-ds="aster" onclick="setDs('aster',this)">ASTER</button>
            <button class="pill ds" data-ds="mapzen" onclick="setDs('mapzen',this)">Mapzen</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// === STATE ===
let _lat=12.2459, _lon=109.1945;
let map, marker, currentLayer;
let _src='open-meteo', _ds='srtm30', _labelsOn=true;
let currentLang='vi';
let _mobOpen=null;

// === I18N ===
const LANG={
  vi:{
    placeholder:"Tìm địa danh hoặc nhập tọa độ...",
    pasteMsg:"✓ Đã dán thành công",pasteTitle:"Dán từ khay nhớ tạm",gpsTitle:"Vị trí của tôi",
    lightMode:"☀ Giao diện sáng",darkMode:"🌙 Giao diện tối",
    lblSource:"Nguồn:",lblDataset:"Dữ liệu:",lblElev:"Độ cao",lblTerrain:"Địa hình",
    locating:"Đang định vị...",gpsFound:"📍 Đã tìm thấy vị trí",
    gpsErr:"Không thể lấy vị trí GPS",noGps:"Trình duyệt không hỗ trợ GPS",
    errApi:"Lỗi lấy dữ liệu",unknown:"Không rõ vị trí",sea:"Biển",
    selected:"Đã chọn: ",labelsOn:"Nhãn: Bật",labelsOff:"Nhãn: Tắt",
    layerStreet:"Đường xá",layerSatellite:"Vệ tinh",layerTopo:"Địa hình",layerLabels:"Nhãn",
    t:["🌊 Dưới mực nước biển","🏖 Bờ biển / Đồng bằng thấp","🌾 Đồng bằng","🌿 Trung du",
       "⛰ Đồi thấp","🏔 Núi trung bình","🏔 Núi cao","🏔 Núi rất cao","🗻 Đỉnh núi lớn","🗻 Đỉnh núi cực cao"]
  },
  en:{
    placeholder:"Search place or enter coordinates...",
    pasteMsg:"✓ Pasted successfully",pasteTitle:"Paste from clipboard",gpsTitle:"My Location",
    lightMode:"☀ Light Mode",darkMode:"🌙 Dark Mode",
    lblSource:"Source:",lblDataset:"Dataset:",lblElev:"Elevation",lblTerrain:"Terrain",
    locating:"Locating...",gpsFound:"📍 Location found",
    gpsErr:"Could not retrieve GPS location",noGps:"GPS not supported on this browser",
    errApi:"Failed to fetch data",unknown:"Unknown Location",sea:"Sea",
    selected:"Selected: ",labelsOn:"Labels: On",labelsOff:"Labels: Off",
    layerStreet:"Street",layerSatellite:"Satellite",layerTopo:"Terrain",layerLabels:"Labels",
    t:["🌊 Below Sea Level","🏖 Coastal / Low Plains","🌾 Plains","🌿 Midlands",
       "⛰ Low Hills","🏔 Medium Mountains","🏔 High Mountains","🏔 Very High Mts","🗻 Major Peaks","🗻 Extreme Peaks"]
  }
};

// data-i18n keys map to LANG keys
const I18N_ATTR={lblSource:'lblSource',lblDataset:'lblDataset',lblTerrain:'lblTerrain',sea:'sea'};

function updateLangUI(){
  const l=LANG[currentLang];
  document.getElementById('searchInput').placeholder=l.placeholder;
  document.getElementById('pasteBtn').title=l.pasteTitle;
  document.getElementById('gpsBtn').title=l.gpsTitle;
  document.getElementById('elevDsLabel').textContent=`${l.lblElev} · ${_ds.toUpperCase()}`;
  // data-i18n elements
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const key=el.dataset.i18n; if(l[key]) el.textContent=l[key];
  });
  // Layer button labels
  document.querySelectorAll('[data-layer]').forEach(b=>{
    const k={street:'layerStreet',satellite:'layerSatellite',topo:'layerTopo'}[b.dataset.layer];
    if(k) b.textContent=l[k];
  });
  document.querySelectorAll('.layer-btn.lbl').forEach(b=>b.textContent=l.layerLabels);
  document.querySelectorAll('.lang-btn').forEach(b=>b.textContent=currentLang.toUpperCase());
}

function toggleLang(){
  currentLang=currentLang==='vi'?'en':'vi';
  updateLangUI(); doScan();
}

// === MAP LAYERS ===
const LAYERS={
  satellite:L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxZoom:19,attribution:''}),
  street:   L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:''}),
  topo:     L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',{maxZoom:17,attribution:''})
};
const LABEL_TILE=L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_only_labels/{z}/{x}/{y}{r}.png',
  {maxZoom:19,opacity:1,subdomains:'abcd',className:'label-tile-invert'});

function switchLayer(name, btn){
  if(currentLayer) map.removeLayer(currentLayer);
  currentLayer=LAYERS[name]; currentLayer.addTo(map);
  // sync all layer buttons across desktop + mobile
  document.querySelectorAll('[data-layer]').forEach(b=>b.classList.toggle('active',b.dataset.layer===name));
  const shouldLabel=(name==='satellite');
  if(shouldLabel&&!_labelsOn){ _labelsOn=true; LABEL_TILE.addTo(map); }
  else if(!shouldLabel&&_labelsOn){ _labelsOn=false; map.removeLayer(LABEL_TILE); }
  else if(_labelsOn){ map.removeLayer(LABEL_TILE); LABEL_TILE.addTo(map); }
  document.querySelectorAll('.layer-btn.lbl').forEach(b=>b.classList.toggle('on',_labelsOn));
}

function toggleLabels(btn){
  _labelsOn=!_labelsOn;
  if(_labelsOn){ LABEL_TILE.addTo(map); showToast(LANG[currentLang].labelsOn); }
  else{ map.removeLayer(LABEL_TILE); showToast(LANG[currentLang].labelsOff); }
  document.querySelectorAll('.layer-btn.lbl').forEach(b=>b.classList.toggle('on',_labelsOn));
}

// === MAP INIT ===
const disableProp=id=>{
  const el=document.getElementById(id);
  if(el){L.DomEvent.disableClickPropagation(el);L.DomEvent.disableScrollPropagation(el);}
};

function initMap(){
  updateLangUI();
  map=L.map('map',{zoomControl:false,attributionControl:false}).setView([_lat,_lon],13);
  currentLayer=LAYERS.satellite; currentLayer.addTo(map); LABEL_TILE.addTo(map);
  const mkIcon=()=>L.divIcon({
    html:`<div style="width:18px;height:18px;background:#3dffa0;border:2.5px solid #fff;border-radius:50% 50% 50% 0;transform:rotate(-45deg);box-shadow:0 2px 10px rgba(0,0,0,.6),0 0 0 3px rgba(61,255,160,.25)"></div>`,
    iconSize:[18,18],iconAnchor:[9,18],className:''
  });
  marker=L.marker([_lat,_lon],{icon:mkIcon(),draggable:true}).addTo(map);
  ['topArea','layerPanel','cfgPanel','zoomCluster','elevBadge','mobGrp'].forEach(disableProp);
  marker.on('dragend',e=>{ const p=e.target.getLatLng(); applyCoords(+p.lat.toFixed(6),+p.lng.toFixed(6),false,true); });
  map.on('click',e=>{ applyCoords(+e.latlng.lat.toFixed(6),+e.latlng.lng.toFixed(6),false,true); });
}

// === COORDS ===
function applyCoords(lat,lon,moveMap=true,autoScan=false){
  _lat=lat; _lon=lon;
  _skipInput=true;
  document.getElementById('searchInput').value=`${lat}° N, ${lon}° E`;
  _skipInput=false;
  if(marker) marker.setLatLng([lat,lon]);
  if(map){ moveMap ? map.setView([lat,lon],map.getZoom()) : map.panTo([lat,lon]); }
  if(autoScan) doScan();
}

function setCoords(lat,lon){ applyCoords(lat,lon,true,true); }

// === GPS ===
function doGPS(){
  if(!navigator.geolocation){ showToast(LANG[currentLang].noGps,true); return; }
  const btn=document.getElementById('gpsBtn');
  btn.classList.add('locating');
  navigator.geolocation.getCurrentPosition(
    pos=>{
      const lat=+pos.coords.latitude.toFixed(6), lon=+pos.coords.longitude.toFixed(6);
      applyCoords(lat,lon,true); map.setView([lat,lon],15);
      btn.classList.remove('locating'); showToast(LANG[currentLang].gpsFound); doScan();
    },
    ()=>{ btn.classList.remove('locating'); showToast(LANG[currentLang].gpsErr,true); },
    {enableHighAccuracy:true,timeout:15000}
  );
}

// === PASTE ===
async function doPaste(){
  try{
    const t=await navigator.clipboard.readText();
    document.getElementById('searchInput').value=t;
    onInput(t); showToast(LANG[currentLang].pasteMsg); doScan();
  }catch{ document.getElementById('searchInput').focus(); }
}

// === THEME ===
function toggleTheme(){
  const isDark=document.documentElement.getAttribute('data-theme')==='dark';
  document.documentElement.setAttribute('data-theme',isDark?'light':'dark');
  showToast(isDark?LANG[currentLang].lightMode:LANG[currentLang].darkMode);
}

// === SRC / DS ===
function setSrc(src){
  _src=src;
  document.querySelectorAll('.pill:not(.ds)').forEach(b=>b.classList.toggle('active',b.dataset.src===src));
  doScan();
}

function setDs(ds){
  _ds=ds;
  document.querySelectorAll('.pill.ds').forEach(b=>b.classList.toggle('active',b.dataset.ds===ds));
  document.getElementById('elevDsLabel').textContent=`${LANG[currentLang].lblElev} · ${ds.toUpperCase()}`;
  showToast(LANG[currentLang].selected+ds.toUpperCase()); doScan();
}

// === MOBILE PANEL ===
function mobToggle(which){
  if(_mobOpen===which){ mobClose(); return; }
  mobClose(); _mobOpen=which;
  document.getElementById(which==='layer'?'popLayer':'popCfg').classList.add('open');
  document.getElementById(which==='layer'?'mobLayerBtn':'mobCfgBtn').classList.add('active');
}
function mobClose(){
  document.querySelectorAll('.mob-popup').forEach(p=>p.classList.remove('open'));
  document.querySelectorAll('#mobLayerBtn,#mobCfgBtn').forEach(b=>b.classList.remove('active'));
  _mobOpen=null;
}
document.addEventListener('click',e=>{
  if(_mobOpen&&!e.target.closest('.mob-grp')) mobClose();
  if(!e.target.closest('#acDrop')&&!e.target.closest('#searchInput')) acClose();
});

// === MOBILE LAYOUT ADJUST ===
function adjustMobGrp(){
  const grp=document.getElementById('mobGrp');
  if(!grp||window.innerWidth>768) return;
  const rect=document.getElementById('topArea').getBoundingClientRect();
  grp.style.top=(rect.bottom+8)+'px';
}
window.addEventListener('resize',adjustMobGrp);
const ro=new ResizeObserver(adjustMobGrp);

// === TOAST ===
function showToast(msg,isErr=false){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.className='toast on'+(isErr?' err':'');
  setTimeout(()=>el.classList.remove('on'),2500);
}

// === TERRAIN ===
function terrain(e){
  const steps=[[0,0],[10,2],[50,7],[200,16],[500,28],[1000,44],[1500,57],[2000,69],[3000,83],[Infinity,96]];
  for(let i=0;i<steps.length;i++) if(e<steps[i][0]) return{idx:i,p:steps[i][1]};
  return{idx:9,p:96};
}

// === API ===
async function fetchElev(lat,lon){
  if(_src==='open-elevation'){
    const r=await fetch('https://api.open-elevation.com/api/v1/lookup',{
      method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json'},
      body:JSON.stringify({locations:[{latitude:lat,longitude:lon}]}),
      signal:AbortSignal.timeout(10000)
    });
    if(!r.ok) throw new Error(r.status);
    const d=await r.json();
    if(!d.results?.[0]) throw new Error('No data');
    return{elevation:d.results[0].elevation};
  }
  const r=await fetch(`https://api.open-meteo.com/v1/elevation?latitude=${lat}&longitude=${lon}`,{signal:AbortSignal.timeout(9000)});
  if(!r.ok) throw new Error(r.status);
  const d=await r.json();
  const v=Array.isArray(d.elevation)?d.elevation[0]:d.elevation;
  if(v==null) throw new Error('No data');
  return{elevation:v};
}

async function fetchLoc(lat,lon){
  try{
    const r=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=${currentLang}`,
      {headers:{'User-Agent':'ElevationScannerApp/1.0'},signal:AbortSignal.timeout(7000)});
    if(!r.ok) return null;
    const d=await r.json(), a=d.address||{}, parts=[];
    const local=a.village||a.hamlet||a.suburb||a.neighbourhood||a.town||a.city_district;
    const dist=a.county||a.district||a.city;
    const prov=a.state||a.province;
    if(local) parts.push(local);
    if(dist&&dist!==local) parts.push(dist);
    if(prov&&prov!==dist) parts.push(prov);
    if(a.country) parts.push(a.country);
    return parts.length?parts.join(', '):d.display_name;
  }catch{return null;}
}

async function doScan(){
  const badge=document.getElementById('elevBadge');
  badge.classList.add('show','loading');
  document.getElementById('elevLoc').textContent=LANG[currentLang].locating;
  try{
    const data=await fetchElev(_lat,_lon);
    const elev=Math.round(data.elevation*10)/10;
    const t=terrain(elev);
    document.getElementById('elevNum').textContent=elev.toLocaleString('en-US');
    document.getElementById('terrainDesc').textContent=LANG[currentLang].t[t.idx];
    setTimeout(()=>document.getElementById('terrainThumb').style.left=t.p+'%',300);
    badge.classList.remove('loading');
    fetchLoc(_lat,_lon).then(name=>{
      document.getElementById('elevLoc').textContent=name||LANG[currentLang].unknown;
    });
  }catch{
    showToast(LANG[currentLang].errApi,true);
    badge.classList.remove('loading');
    document.getElementById('elevLoc').textContent=LANG[currentLang].errApi;
  }
}

// === COORDINATE PARSER ===
let _skipInput=false;
function onInput(raw){
  const nums=raw.replace(/[°′″'"]/g,' ').match(/-?\d+(?:\.\d+)?/g);
  if(!nums||nums.length<2) return false;
  let lat=parseFloat(nums[0]),lon=parseFloat(nums[1]);
  if(/S/i.test(raw)) lat=-Math.abs(lat);
  if(/W/i.test(raw)) lon=-Math.abs(lon);
  if(isNaN(lat)||isNaN(lon)||lat<-90||lat>90) return false;
  lon=((lon+180)%360+360)%360-180;
  _lat=lat; _lon=lon;
  if(marker){marker.setLatLng([lat,lon]);map.panTo([lat,lon]);}
  return true;
}

// === AUTOCOMPLETE ===
let _acDebounce=null,_acResults=[],_acFocusIdx=-1,_acOpen=false,_acAbort=null;

const TYPE_ICONS={
  mountain:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 20 12 4 21 20 3 20"/></svg>`,
  water:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C6 2 2 8 2 12s3 8 10 8 10-4 10-8-4-10-10-10z"/></svg>`,
  city:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>`,
  pin:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="10" r="3"/><path d="M12 2C7.03 2 3 6.03 3 11c0 5.25 7.5 11 9 11s9-5.75 9-11c0-4.97-4.03-9-9-9z"/></svg>`
};

function getTypeIcon(cls,type){
  const s=(cls+' '+type).toLowerCase();
  if(s.includes('peak')||s.includes('mountain')) return TYPE_ICONS.mountain;
  if(s.includes('water')||s.includes('lake')||s.includes('river')||s.includes('bay')) return TYPE_ICONS.water;
  if(s.includes('city')||s.includes('town')||s.includes('village')) return TYPE_ICONS.city;
  return TYPE_ICONS.pin;
}

function getTypeLabel(cls,type){
  const s=(cls+' '+type).toLowerCase();
  const map={city:'Thành phố',town:'Thị trấn',village:'Làng/Xã',peak:'Núi/Đỉnh',mountain:'Núi/Đỉnh',
    lake:'Hồ',river:'Sông',bay:'Vịnh/Biển',sea:'Vịnh/Biển',administrative:'Khu vực',
    natural:'Thiên nhiên',tourism:'Du lịch',historic:'Di tích',amenity:'Địa điểm'};
  for(const k in map) if(s.includes(k)) return map[k];
  return cls||type||'';
}

function buildSubtitle(item){
  const a=item.address||{}, parts=[];
  const city=a.city||a.town||a.county||a.state_district;
  const state=a.state||a.province;
  if(city&&city!==item.name) parts.push(city);
  if(state&&state!==city&&state!==item.name) parts.push(state);
  if(a.country) parts.push(a.country);
  return parts.join(', ')||item.display_name||'';
}

function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function acClose(){ document.getElementById('acDrop').classList.remove('open'); _acOpen=false; _acFocusIdx=-1; }

function acRender(results){
  _acResults=results; _acFocusIdx=-1;
  const dd=document.getElementById('acDrop');
  if(!results.length){ dd.innerHTML=`<div class="ac-empty">${currentLang==='vi'?'Không tìm thấy địa danh':'No places found'}</div>`; dd.classList.add('open'); _acOpen=true; return; }
  dd.innerHTML=results.map((r,i)=>{
    const name=r.name||r.display_name.split(',')[0];
    return `<div class="ac-item" data-idx="${i}" onmousedown="acSelect(${i})">
      <div class="ac-icon">${getTypeIcon(r.class||'',r.type||'')}</div>
      <div class="ac-text">
        <div class="ac-name">${escHtml(name)}</div>
        ${buildSubtitle(r)?`<div class="ac-sub">${escHtml(buildSubtitle(r))}</div>`:''}
      </div>
      ${getTypeLabel(r.class||'',r.type||'')?`<div class="ac-type">${escHtml(getTypeLabel(r.class||'',r.type||''))}</div>`:''}
    </div>`;
  }).join('');
  dd.classList.add('open'); _acOpen=true;
}

async function acSearch(q){
  if(_acAbort) _acAbort.abort();
  _acAbort=new AbortController();
  try{
    const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&addressdetails=1&limit=6&accept-language=${currentLang}`,
      {headers:{'User-Agent':'ElevationScannerApp/1.0'},signal:_acAbort.signal});
    if(!r.ok) throw new Error('fetch fail');
    const data=await r.json(); _acAbort=null; return data;
  }catch(e){ return e.name==='AbortError'?'aborted':null; }
}

function acSelect(idx){
  const r=_acResults[idx]; if(!r) return;
  const lat=parseFloat(r.lat),lon=parseFloat(r.lon);
  _skipInput=true; document.getElementById('searchInput').value=r.name||r.display_name.split(',')[0]; _skipInput=false;
  acClose(); applyCoords(lat,lon,true,true);
  if(r.boundingbox){
    try{ map.fitBounds([[+r.boundingbox[0],+r.boundingbox[2]],[+r.boundingbox[1],+r.boundingbox[3]]],{maxZoom:15}); }
    catch{ map.setView([lat,lon],14); }
  }else map.setView([lat,lon],14);
}

function acMoveFocus(dir){
  const items=document.querySelectorAll('#acDrop .ac-item'); if(!items.length) return;
  items.forEach(el=>el.classList.remove('focused'));
  _acFocusIdx=Math.max(0,Math.min(items.length-1,_acFocusIdx+dir));
  items[_acFocusIdx].classList.add('focused'); items[_acFocusIdx].scrollIntoView({block:'nearest'});
}

function onSearchInput(val){
  if(_skipInput) return;
  clearTimeout(_acDebounce);
  if(_acAbort){_acAbort.abort();_acAbort=null;}
  if(onInput(val)){acClose();_acResults=[];return;}
  const q=val.trim();
  if(q.length<2){acClose();_acResults=[];return;}
  document.getElementById('acDrop').innerHTML=`<div class="ac-loading"><div class="ac-dot"></div><div class="ac-dot"></div><div class="ac-dot"></div></div>`;
  document.getElementById('acDrop').classList.add('open'); _acOpen=true;
  _acDebounce=setTimeout(async()=>{
    const res=await acSearch(q);
    if(res==='aborted') return;
    res===null ? (document.getElementById('acDrop').innerHTML=`<div class="ac-empty">${currentLang==='vi'?'Lỗi kết nối':'Connection error'}</div>`) : acRender(res);
  },320);
}

async function triggerSearch(){
  const val=document.getElementById('searchInput').value.trim(); if(!val) return;
  if(onInput(val)){acClose();_acResults=[];doScan();return;}
  clearTimeout(_acDebounce);
  if(_acAbort){_acAbort.abort();_acAbort=null;}
  acClose();
  const res=await acSearch(val);
  if(res&&res!=='aborted'&&res.length){_acResults=res;acSelect(0);}
}

function onSearchKeydown(e){
  if(e.key==='Escape'){acClose();return;}
  if(e.key==='ArrowDown'){e.preventDefault();acMoveFocus(1);return;}
  if(e.key==='ArrowUp'){e.preventDefault();acMoveFocus(-1);return;}
  if(e.key==='Enter'){e.preventDefault();_acFocusIdx>=0&&_acResults.length?acSelect(_acFocusIdx):triggerSearch();}
}

function clearSearch(){
  clearTimeout(_acDebounce);
  if(_acAbort){_acAbort.abort();_acAbort=null;}
  _acResults=[];
  const inp=document.getElementById('searchInput');
  inp.value=''; inp.focus(); acClose();
}

// === BOOT ===
window.addEventListener('load',()=>{
  initMap(); setTimeout(doScan,400);
  adjustMobGrp(); ro.observe(document.getElementById('topArea'));
});
</script>
</body>
</html>
